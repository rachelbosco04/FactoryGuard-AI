# Project Configuration
# ===================

# Data Generation Parameters
data_generation:
  n_machines: 500
  hours_per_machine: 4320  # 6 months
  failure_rate: 0.025      # 2.5%
  test_size: 0.2          # 20% for testing
  random_seed: 42

# Feature Engineering Parameters
feature_engineering:
  rolling_windows: [6, 12, 24, 48]  # hours
  lag_features: [1, 2, 3, 6, 12]    # hours
  ema_alphas: [0.1, 0.3, 0.5]       # exponential moving average
  
  # Sensors to engineer features for
  key_sensors:
    - spindle_temp
    - spindle_vibration
    - motor_current
    - tool_vibration
    - tool_wear
    - hydraulic_pressure
    - acoustic_emission

# Model Training Parameters
modeling:
  # Models to train
  models:
    - logistic_regression
    - random_forest
    - xgboost
    - lightgbm
  
  # XGBoost parameters
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    
  # LightGBM parameters
  lightgbm:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    num_leaves: 31
    
  # Random Forest parameters
  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 10
  
  # Cross-validation
  cv_folds: 5
  
  # Hyperparameter tuning
  optuna:
    n_trials: 50
    timeout: 3600  # 1 hour

# Imbalance Handling
imbalance:
  method: smote  # Options: smote, adasyn, borderline_smote
  sampling_strategy: 0.5  # Ratio of minority to majority
  k_neighbors: 5
  
  # Class weights
  use_class_weights: true

# Evaluation Metrics
evaluation:
  primary_metric: pr_auc  # Precision-Recall AUC
  secondary_metrics:
    - precision
    - recall
    - f1_score
    - roc_auc
  
  # Threshold optimization
  optimize_threshold: true
  threshold_metric: f1_score

# SHAP Explainability
explainability:
  shap:
    n_background_samples: 100
    n_explain_samples: 50
  
  # Top features to display
  top_n_features: 10

# API Deployment
deployment:
  api:
    host: 0.0.0.0
    port: 5000
    debug: false
  
  # Model serving
  model_path: models/best_model.pkl
  scaler_path: models/scaler.pkl
  
  # Latency requirements
  max_prediction_time_ms: 100

# Logging
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: logs/project.log

# Paths
paths:
  raw_data: data/raw
  processed_data: data/processed
  models: models
  reports: reports
  figures: reports/figures
