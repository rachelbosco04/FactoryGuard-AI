<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactoryGuard AI - Predictive Maintenance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
background:linear-gradient(135deg,#011125 0%,#69bcd8 40%, #011125 );
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.container{
    max-width:600px;
    width:100%;
}

.header{
text-align:center;
color:rgb(255, 255, 255);
margin-bottom:40px;
}

.logo{
font-size:3em;
margin-bottom:10px;
}

.title{
font-size:2.5em;
font-weight:700;
margin-bottom:10px;
letter-spacing:-1px;
}

.subtitle{
font-size:1.1em;
opacity:.9;
}

.card{
background:white;
border-radius:18px;
padding:35px;
box-shadow:0 20px 60px rgba(0,0,0,.3);
}

.status-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:35px;
}

.status-item{
text-align:center;
padding:20px;
border-radius:12px;
color:white;
}

.green{background:#3b7a57;}
.blue{background:#4f6d7a;}
.purple{background:#6b6fa3;}

.status-icon{
font-size:2em;
margin-bottom:5px;
}


/* SENSOR INPUTS */

.sensor-input{
margin-bottom:22px;
}

.sensor-label{
font-weight:600;
color:#171c25;
margin-bottom:8px;
display:block;
}

.sensor-value-box{
display:flex;
align-items:center;
background:#f9fafb;
border:2px solid #d1d4db;
border-radius:10px;
padding:14px 55px 14px 18px;
font-size:1.3em;
font-weight:600;
color:#1f2937;
position:relative;
}

.sensor-value-box input{
width:100%;
border:none;
background:transparent;
font-size:1em;
font-weight:600;
outline:none;
color:#1f2937;
cursor:text;
}

/* Hide firefox arrows */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
  display: none !important;
}

input[type="number"] {
  -moz-appearance: textfield;
}

/* Custom arrows - hidden by default */
.arrow-controls{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:2px;
opacity:0;
visibility:hidden;
transition:opacity 0.2s, visibility 0.2s;
}

/* Show arrows on hover */
.sensor-value-box:hover .arrow-controls{
opacity:1;
visibility:visible;
}

.arrow-btn{
width:24px;
height:18px;
border:none;
background:#e5e7eb;
border-radius:4px;
font-size:12px;
cursor:pointer;
color:#6b7280;
display:flex;
align-items:center;
justify-content:center;
transition:all 0.15s;
}

.arrow-btn:hover{
background:#667eea;
color:white;
transform:scale(1.1);
}

.arrow-btn:active{
transform:scale(0.95);
}

/* BUTTONS */

.button-row{
display:flex;
gap:15px;
margin-top:25px;
}

.button-row button{
flex:1;
font-family:inherit;
font-size:1.1em;
font-weight:700;
}

.predict-btn{
padding:18px;
background:linear-gradient(135deg,#405c8a 0%,#1f1634 100%);
color:white;
border:none;
border-radius:14px;
cursor:pointer;
transition:all 0.2s;
}

.reset-btn{
padding:18px;
background:#545a67;
color:white;
border:none;
border-radius:14px;
cursor:pointer;
transition:all 0.2s;
}

.predict-btn:hover,
.reset-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}

/* RESULT */

.result-box{
display:none;
margin-top:25px;
padding:25px;
border-radius:12px;
font-weight:600;
position:relative;
}

.result-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.result-header h3{
font-size:1.2em;
font-weight:700;
}

.result-box.low{
background:#d1fae5;
border:3px solid #10b981;
color:#1b7d3f;
}

.result-box.medium{
background:#fef3c7;
border:3px solid #f59e0b;
color:#78350f;
}

.result-box.high{
background:#fee2e2;
border:3px solid #ef4444;
color:#7f1d1d;
}

.probability{
font-size:2.5em;
font-weight:700;
margin:10px 0;
}

/* RISK BADGE */

.risk-badge{
position:absolute;
top:20px;
right:20px;
padding:6px 14px;
border-radius:20px;
font-size:.8em;
font-weight:700;
color:white;
}

.low-badge{background:#1b7d3f;}
.medium-badge{background:#f59e0b;}
.high-badge{background:#ef4444;}

.loading{
display:none;
text-align:center;
padding:20px;
}

.spinner{
border:4px solid #f3f4f6;
border-top:4px solid #667eea;
border-radius:50%;
width:50px;
height:50px;
margin:0 auto 10px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* FOOTER */

.footer{
margin-top:15px;
text-align:center;
font-size:.9em;
color:#6b7280;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">🏭 FactoryGuard-AI</div>
<div class="subtitle">CNC Machine Predictive Maintenance System</div>
</div>

<div class="card">

<div class="status-grid">
<div class="status-item green"><div class="status-icon">✓</div>API Online</div>
<div class="status-item blue"><div class="status-icon">🤖</div>LightGBM Model</div>
<div class="status-item purple"><div class="status-icon">⚡</div>Fast Response</div>
</div>

<!-- SENSOR INPUTS -->

<div class="sensor-input">
<label class="sensor-label">Spindle Temperature (°C)</label>
<div class="sensor-value-box">
<input type="number" id="temperature" value="45.2" step="0.1">
<div class="arrow-controls">
<button class="arrow-btn" onmousedown="startIncrement('temperature')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startIncrement('temperature')" ontouchend="stopChange()">▲</button>
<button class="arrow-btn" onmousedown="startDecrement('temperature')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startDecrement('temperature')" ontouchend="stopChange()">▼</button>
</div>
</div>
</div>

<div class="sensor-input">
<label class="sensor-label">Spindle Vibration (mm/s)</label>
<div class="sensor-value-box">
<input type="number" id="vibration" value="2.0" step="0.1">
<div class="arrow-controls">
<button class="arrow-btn" onmousedown="startIncrement('vibration')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startIncrement('vibration')" ontouchend="stopChange()">▲</button>
<button class="arrow-btn" onmousedown="startDecrement('vibration')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startDecrement('vibration')" ontouchend="stopChange()">▼</button>
</div>
</div>
</div>

<div class="sensor-input">
<label class="sensor-label">Spindle Pressure (bar)</label>
<div class="sensor-value-box">
<input type="number" id="pressure" value="6.0" step="0.5">
<div class="arrow-controls">
<button class="arrow-btn" onmousedown="startIncrement('pressure')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startIncrement('pressure')" ontouchend="stopChange()">▲</button>
<button class="arrow-btn" onmousedown="startDecrement('pressure')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startDecrement('pressure')" ontouchend="stopChange()">▼</button>
</div>
</div>
</div>

<div class="sensor-input">
<label class="sensor-label">Tool Wear (%)</label>
<div class="sensor-value-box">
<input type="number" id="toolwear" value="15.0" step="1.0" min="0" max="100">
<div class="arrow-controls">
<button class="arrow-btn" onmousedown="startIncrement('toolwear')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startIncrement('toolwear')" ontouchend="stopChange()">▲</button>
<button class="arrow-btn" onmousedown="startDecrement('toolwear')" onmouseup="stopChange()" onmouseleave="stopChange()" ontouchstart="startDecrement('toolwear')" ontouchend="stopChange()">▼</button>
</div>
</div>
</div>

<div class="button-row">
<button class="predict-btn" onclick="predictFailure()">🔮 Predict Failure Risk</button>
<button class="reset-btn" onclick="resetToDefaults()">🔄 Reset to Defaults</button>
</div>

<div class="loading" id="loading">
<div class="spinner"></div>
Analyzing sensor data...
</div>

<div class="result-box" id="result">

<div class="result-header">
<h3>Failure Probability</h3>
<div id="riskBadge" class="risk-badge low-badge">LOW</div>
</div>

<div class="probability" id="probability"></div>
<div id="message"></div>

</div>

<div class="footer" id="footer"></div>

</div>
</div>

<script>

const defaults={temperature:45.2,vibration:2.0,pressure:6.0,toolwear:15.0}
const steps={temperature:1.0,vibration:0.1,pressure:0.5,toolwear:1.0}

let changeInterval = null
let changeTimeout = null
let clickCount = 0

function startIncrement(sensor){
const input = document.getElementById(sensor)
// Single click - increment once
input.value = (parseFloat(input.value) + steps[sensor]).toFixed(1)
clickCount++

// Start continuous increment after 300ms hold
changeTimeout = setTimeout(() => {
changeInterval = setInterval(() => {
input.value = (parseFloat(input.value) + steps[sensor]).toFixed(1)
}, 100) // Fast increment every 100ms
}, 300)
}

function startDecrement(sensor){
const input = document.getElementById(sensor)
// Single click - decrement once
let newVal = parseFloat(input.value) - steps[sensor]
if(newVal < 0) newVal = 0
input.value = newVal.toFixed(1)
clickCount++

// Start continuous decrement after 300ms hold
changeTimeout = setTimeout(() => {
changeInterval = setInterval(() => {
let val = parseFloat(input.value) - steps[sensor]
if(val < 0) val = 0
input.value = val.toFixed(1)
}, 100) // Fast decrement every 100ms
}, 300)
}

function stopChange(){
clearTimeout(changeTimeout)
clearInterval(changeInterval)
clickCount = 0
}

function resetToDefaults(){
document.getElementById('temperature').value = defaults.temperature
document.getElementById('vibration').value = defaults.vibration
document.getElementById('pressure').value = defaults.pressure
document.getElementById('toolwear').value = defaults.toolwear
document.getElementById("result").style.display="none"
document.getElementById("footer").textContent=""
}

async function predictFailure(){

const payload={
sensors:{
spindle_temp:parseFloat(document.getElementById('temperature').value),
spindle_vibration:parseFloat(document.getElementById('vibration').value)/10,
spindle_speed:3000,
motor_current:12.5,
tool_vibration:parseFloat(document.getElementById('vibration').value)/20,
tool_wear:parseFloat(document.getElementById('toolwear').value)/100,
cutting_force:150,
hydraulic_pressure:parseFloat(document.getElementById('pressure').value)*8.33,
coolant_flow:5,
coolant_temp:25,
acoustic_emission:.05,
power_consumption:2.5,
feed_rate:500,
ambient_temp:22,
ambient_humidity:45
}
}

loading.style.display="block"
result.style.display="none"

try{

const response = await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

if(!response.ok){
const errorText = await response.text()
throw new Error(errorText || 'Server error')
}

const data = await response.json()

loading.style.display="none"

const probabilityPercent=(data.failure_probability*100).toFixed(4)
const rawProbability=data.failure_probability.toFixed(6)

probability.textContent=probabilityPercent+"%"

const badge=document.getElementById("riskBadge")

if(data.failure_probability>0.35){

result.className="result-box high"
badge.textContent="HIGH"
badge.className="risk-badge high-badge"

message.innerHTML="⚠ High failure risk detected. Schedule maintenance immediately."

}
else if(data.failure_probability>0.15){

result.className="result-box medium"
badge.textContent="MEDIUM"
badge.className="risk-badge medium-badge"

message.innerHTML="⚠ Medium failure risk detected. Maintenance recommended."

}
else{

result.className="result-box low"
badge.textContent="LOW"
badge.className="risk-badge low-badge"

message.innerHTML="✓ Machine operating normally. No immediate action required."

}

result.style.display="block"

footer.textContent=`Raw Model Output: ${rawProbability} | Response Time: ${data.response_time_ms} ms`

}catch(e){

loading.style.display="none"
console.error("API error:",e)
alert("API Error: " + (e.message || 'Could not connect to server. Please wait 30 seconds for the server to wake up and try again.'))

}

}
</script>

</body>
</html>
